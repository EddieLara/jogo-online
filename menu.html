<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infestation.io - Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginScreen">
        <div class="login-panel">
            <div class="panel-frame">
                <div class="panel-title">INFESTATION.IO</div>
                <div class="panel-subtitle">SERVER ACCESS / ENTER THE WORLD</div>
                <div class="panel-body">
                    <label for="nameInput">PLAYER NAME</label>
                    <input type="text" id="nameInput" placeholder="DIGITE SEU NOME">
                    <button id="playBtn">ENTRAR NO JOGO</button>
                    <button id="googleLoginBtn">LOGIN COM GOOGLE</button>
                </div>
                <div class="panel-footer">PRESS ENTER TO CHAT • USE cmd:on / cmd:off</div>
            </div>
        </div>
    </div>

    <div id="hud">
        <div id="hudStatus">SERVER STATUS: STANDBY</div>
        <div id="commandPanel" class="overlay-panel"></div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <input type="text" id="chatInput" placeholder="CHAT / COMMAND">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
    <script>
        const nameInput = document.getElementById('nameInput');
        const playBtn = document.getElementById('playBtn');

        playBtn.onclick = () => {
            const name = nameInput.value.trim();
            if (!name) {
                alert('DIGITE SEU NOME ANTES DE JOGAR.');
                return;
            }
            myName = name;
            googleUserInfo = { name: name, email: 'local@player.com' };
            if (loginScreen) loginScreen.style.display = 'none';
            if (gameCanvas) gameCanvas.style.display = 'block';
            if (chatInput) chatInput.style.display = 'block';
            connectSocketWithAuth();
        };
    </script>
</body>
</html>
